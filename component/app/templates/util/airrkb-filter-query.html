<!--
- Generic Filter View
-->
<!-- *** add radio buttons for speciess (ALL, HUMAN, MOUSE) -->
<div class="navbar-tool" id="filter-query">
    <form>
        <div class="row" id="receptor-search">

            <div class="col-md-7">
                <div class="section-border">
                    <div class="section-border-label" style="font-size: 1.5em;"><b>Receptor Search</b></div>
                    <div class="row">
                        <div class="input-group">
                            <!-- RECEPTOR SELECTOR -->
                            <div class="col-md-2 label-center label-left">
                                <b>Receptor type:</b>
                            </div>
        
                            <div class="col-md-5">
                                <select class="selectpicker form-control form-control-filter-query" id="filter-query-chain-selectpicker">
                                    <option value="alpha-beta" {{#ifEquals filters.receptor_type "alpha-beta"}}selected{{/ifEquals}}>Alpha-Beta T Cell Receptor (αβTCR)</option>
                                    <option value="gamma-delta" {{#ifEquals filters.receptor_type "gamma-delta"}}selected{{/ifEquals}}>Gamma-Delta T Cell Receptor (γδTCR)</option>
                                </select>
                            </div>

                            <!-- SPECIES SELCTOR -->
                            <div class="col-md-2 label-center label-left">
                                <b>Host species:</b>
                            </div>
        
                            <div class="col-md-3">
                                <select class="selectpicker form-control form-control-filter-query" id="filter-query-species-selectpicker">
                                    <option value="NCBITAXON:9606" {{#ifEquals filters.host_species "NCBITAXON:9606"}}selected{{/ifEquals}}>Human</option>
                                    <option value="NCBITAXON:10090" {{#ifEquals filters.host_species "NCBITAXON:10090"}}selected{{/ifEquals}}>Mouse</option>
                                    <option value="any" {{#unless filters.host_species}}selected{{/unless}}>Any</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- CHAIN SELECTOR -->
                    <div class="row row-space">
                        <div class="col-md-6">
                            <div class="section-border">
                                <div class="section-border-label">
                                    <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>Alpha Chain</b>
                                    <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>Gamma Chain</b>
                                </div>
                                <div id="first-chain">
                                    <!-- Include/Exclude null Values -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b>Missing Values:</b>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-1-include" name="missing-values-1" value="true" {{#ifEquals filters.null_values "true"}}checked{{/ifEquals}}>  Include
                                            </label>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-1-exclude" name="missing-values-1" value="false" {{#ifEquals filters.null_values "false"}}checked{{/ifEquals}}>  Exclude
                                            </label>
                                        </div>
                                    </div>

                                    <!-- CDR3 Junction -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b>CDR3 Junction:</b>
                                        </div>
                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="alpha-junction" aria-describedby="search" placeholder="Ex: CAASSFGNEKLTF" value="{{filters.junction1}}" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                            <input type="search" class="form-control gamma-delta-chain-select" id="gamma-junction" aria-describedby="search" placeholder="Ex: fix me" value="{{filters.junction1}}" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                        </div>
                                    </div>
                                    
                                    <!-- V Selector -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRAV Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRGV Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query alpha-beta-chain-select" id="alpha-v-selectpicker" data-width="100%" title="Any TRAV" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.v1}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRA.V.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRA.V.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRA.V.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query gamma-delta-chain-select" id="gamma-v-selectpicker" data-width="100%" title="Any TRGV" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.v1}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRG.V.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRG.V.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRG.V.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!--  J Selector -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRAJ Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRGJ Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" id="alpha-j-selectpicker" data-width="100%" title="Any TRAJ" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.j1}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRA.J.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRA.J.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRA.J.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" id="gamma-j-selectpicker" data-width="100%" title="Any TRGJ" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.j1}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRG.J.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRG.J.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRG.J.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j1}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <div class="section-border">
                                <div class="section-border-label">
                                    <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>Beta Chain</b>
                                    <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>Delta Chain</b>
                                </div>
                                <div id="second-chain">
                                    <!-- Include/Exclude null Values -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b>Missing Values:</b>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-2-include" name="missing-values-2" value="true" {{#ifEquals filters.null_values "true"}}checked{{/ifEquals}}>  Include
                                            </label>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-2-exclude" name="missing-values-2" value="false" {{#ifEquals filters.null_values "false"}}checked{{/ifEquals}}>  Exclude
                                            </label>
                                        </div>
                                    </div>

                                    <!-- CDR3 Junction -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b>CDR3 Junction:</b>
                                        </div>
                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="beta-junction" aria-describedby="search" placeholder="Ex: CATSALGDTQYF" value="{{filters.junction2}}" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                            <input type="search" class="form-control gamma-delta-chain-select" id="delta-junction" aria-describedby="search" placeholder="Ex: fix me" value="{{filters.junction2}}" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                        </div>
                                    </div>

                                    <!-- V Selector -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRBV Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRDV Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" id="beta-v-selectpicker" data-width="100%" title="Any TRBV" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.v2}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRB.V.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRB.V.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRB.V.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" id="delta-v-selectpicker" data-width="100%" title="Any TRDV" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.v2}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRD.V.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRD.V.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRD.V.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.v2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- J Selector -->
                                    <div class="row">
                                        <div class="col-md-5 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRBJ Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRDJ Gene:</b>
                                        </div>

                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot filters.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" id="beta-j-selectpicker" data-width="100%" title="Any TRBJ" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.j2}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRB.J.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRB.J.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRB.J.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot filters.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query gamma-delta-chain-select" " id="delta-j-selectpicker" data-width="100%" title="Any TRDJ" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" {{#unless filters.j2}}selected{{/unless}}>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRD.J.subgroup}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRD.J.gene}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRD.J.allele}}
                                                            <option value={{this}} {{#ifEquals this ../filters.j2}}selected{{/ifEquals}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <!-- <div class="col-md-6"></div> -->

            <div class="col-md-1">          
                <div class="row airrkb-button-container">
                    <button type="button" class="btn btn-save btn-block btn-glow" id="filter-query-apply">Search <i class="fas fa-search"></i></button>
                    <button type="button" class="btn btn-cancel btn-block" id="filter-query-clear">Clear</button>
                    <button type="button" class="btn btn-search btn-block" id="filter-query-apply-airrkb-example">Example <i class="fas fa-solid fa-dice" disabled></i></button>
                </div>
            </div>

        </div>
    </form>
</div>
