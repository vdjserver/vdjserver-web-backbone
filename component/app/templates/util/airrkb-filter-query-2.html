<!--
- AirrKB Filter View
-->
<!-- *** add radio buttons for speciess (ALL, HUMAN, MOUSE) -->
<div class="navbar-tool" id="filter-query">
    <form>
        <div class="row" id="receptor-search">
            <div class="col-md-3">
                <div class="section-border">
                    <div class="section-border-label" style="font-size: 1.5em;"><b>Receptor Search</b></div>
                    <!-- RECEPTOR SELECTOR -->
                    <div class="row">
                        <div class="input-group">
                            <div class="col-md-4 label-center-end label-left">
                                <b>Receptor type:</b>
                            </div>
        
                            <div class="col">
                                <select class="selectpicker form-control form-control-filter-query" name="filter-query-chain-selectpicker" id="filter-query-chain-selectpicker">
                                    <option value="alpha-beta" {{#ifEquals default.receptor_type "alpha-beta"}}selected{{/ifEquals}}>Alpha-Beta T Cell Receptor</option>
                                    <option value="gamma-delta" {{#ifEquals default.receptor_type "gamma-delta"}}selected{{/ifEquals}}>Gamma-Delta T Cell Receptor</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- SPECIES SELCTOR -->
                    <div class="row row-space">
                        <div class="col-md-4 label-center-end label-left">
                            <b>Host species:</b>
                        </div>
    
                        <div class="col">
                            <select class="selectpicker form-control form-control-filter-query" name="filter-query-species-selectpicker" id="filter-query-species-selectpicker">                                        
                                <option value="human" {{#ifEquals default.host_species "NCBITAXON:9606"}}selected{{/ifEquals}}>Human</option>
                                <option value="mouse" {{#ifEquals default.host_species "NCBITAXON:10090"}}selected{{/ifEquals}}>Mouse</option>
                                <option value="any" {{#ifEquals default.host_species "any"}}selected{{/ifEquals}}>Any</option>
                            </select>
                        </div>
                    </div>


                    <!-- CHAIN SELECTOR -->
                    <div class="row row-space">
                        <div class="col">
                            <div class="section-border">
                                <div class="section-border-label">
                                    <b class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>Alpha Chain</b>
                                    <b class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>Gamma Chain</b>
                                </div>

                                <div id="first-chain">
                                    <!-- Include/Exclude null Values -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>Missing Values:</b>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-1-include" name="missing-values-1" value="true" {{#ifEquals default.null_values "true"}}checked{{/ifEquals}}>  Include
                                            </label>
                                        </div>
                                        <div class="col missing-radio">
                                            <label>
                                                <input type="radio" id="missing-values-1-exclude" name="missing-values-1" value="false" {{#ifEquals default.null_values "false"}}checked{{/ifEquals}}>  Exclude
                                            </label>
                                        </div>
                                    </div>

                                    <!-- CDR3 Junction -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>CDR3 Junction:</b>
                                        </div>
                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="cdr3-1" aria-describedby="search" placeholder="Ex: CAASANSGTYQRW" value="{{secondary_search_heavy}}" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                            <input type="search" class="form-control gamma-delta-chain-select" id="cdr3-1" aria-describedby="search" placeholder="Ex: CAASANSGTYQRW" value="{{secondary_search_heavy}}" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                        </div>
                                    </div>
                                    
                                    <!-- V Selector -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                            <b>TRAV Gene:</b>
                                        </div>
                                        <div class="col-md-4 label-center-end label-left gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                            <b>TRAG Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query alpha-beta-chain-select" name="filter-query-first-v-selectpicker" id="filter-query-first-v-selectpicker" data-width="100%" title="Any TRAV (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRA.V.subgroup}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRA.V.gene}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRA.V.allele}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query gamma-delta-chain-select" name="filter-query-first-v-selectpicker" id="filter-query-first-v-selectpicker" data-width="100%" title="Any TRGV (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRG.V.subgroup}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRG.V.gene}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRG.V.allele}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <!-- J Selector -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRAJ Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRGJ Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" name="filter-query-first-j-selectpicker" id="filter-query-first-j-selectpicker" data-width="100%" title="Any TRAJ (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRA.J.subgroup}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRA.J.gene}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRA.J.allele}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" name="filter-query-first-j-selectpicker" id="filter-query-first-j-selectpicker" data-width="100%" title="Any TRGJ (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRG.J.subgroup}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">
                                                        {{#each tr_names.TRG.J.gene}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRG.J.allele}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
    
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row row-space">
                        <div class="col">
                            <div class="section-border">
                                <div class="alpha-beta-chain-select section-border-label">
                                    <b class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>Beta Chain</b>
                                    <b class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>Delta Chain</b>
                                </div>
                                <div id="second-chain">
                                    <!-- Include/Exclude null Values -->

                                        </div>
                                        <div class="col missing-radio">
                                            <label>

                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="cdr3-2" aria-describedby="search" placeholder="Ex: CASSQDGY" value="{{secondary_search_heavy}}" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                            <input type="search" class="form-control gamma-delta-chain-select" id="cdr3-2" aria-describedby="search" placeholder="Ex: CASSQDGY" value="{{secondary_search_heavy}}" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                        </div>
                                    </div>

                                    <!-- V Selector -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRBV Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRDV Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" name="filter-query-second-v-selectpicker" id="filter-query-second-v-selectpicker" data-width="100%" title="Any TRBV (or specify)" data-live-search="true">

                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">

                                                    <optgroup label="Gene">

                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">
                                                        {{#each tr_names.TRB.V.allele}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                            <div class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" name="filter-query-second-v-selectpicker" id="filter-query-second-v-selectpicker" data-width="100%" title="Any TRDV (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">
                                                        {{#each tr_names.TRD.V.subgroup}}
                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Gene">

                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                    <optgroup label="Allele">

                                                            <option value={{this}}>{{this}}</option>
                                                        {{/each}}
                                                    </optgroup>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- J Selector -->
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>TRBJ Gene:</b>
                                            <b class="gamma-delta-chain-select" {{#ifNot default.receptor_type "gamma-delta"}}hidden{{/ifNot}}>TRDJ Gene:</b>
                                        </div>
                                        <div class="col">
                                            <div class="alpha-beta-chain-select" {{#ifNot default.receptor_type "alpha-beta"}}hidden{{/ifNot}}>
                                                <select class="selectpicker form-control-filter-query" name="filter-query-second-j-selectpicker" id="filter-query-second-j-selectpicker" data-width="100%" title="Any TRBJ (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">

                                                <select class="selectpicker form-control-filter-query gamma-delta-chain-select" name="filter-query-second-j-selectpicker" id="filter-query-second-j-selectpicker" data-width="100%" title="Any TRDJ (or specify)" data-live-search="true">
                                                    <optgroup label="All">
                                                        <option value="any" selected>Any</option>
                                                    </optgroup>
                                                    <optgroup label="Family">

            <!-- <div class="col-md-6"></div> -->

            <div class="col-md-1">          
                <div class="row airrkb-button-container">
                    <button type="button" class="btn btn-save btn-block btn-glow" id="filter-query-apply">Search <i class="fas fa-search"></i></button>
                    <button type="button" class="btn btn-cancel btn-block" id="filter-query-clear">Clear</button>
                    <button type="button" class="btn btn-search btn-block" id="filter-query-apply-airrkb-example">Example <i class="fas fa-solid fa-dice" disabled></i></button>
