<!--
- AirrKB Filter View
-->
<!-- *** add radio buttons for speciess (ALL, HUMAN, MOUSE) -->
<div class="navbar-tool" id="filter-query">
    <form>
        <div class="col-md-2">
            <button type="button" class="btn btn-warning btn-block" id="filter-query-change-template" style="margin: 0.5em 0.5em;">Template 2</button>
        </div>
        
        <div class="row" id="receptor-search">
            <div class="col-md-3">
                <div class="section-border">
                    <div class="section-border-label" style="font-size: 1.5em;">Receptor Search</div>
                    <!-- RECEPTOR SELECTOR -->
                    <div class="row">
                        <div class="input-group">
                            <div class="col-md-4 label-center-end label-left">
                                <b>Receptor type:</b>
                            </div>
        
                            <div class="col">
                                <select class="selectpicker form-control form-control-filter-query" name="filter-query-chain-selectpicker" id="filter-query-chain-selectpicker">
                                    <option value="alpha-beta" selected>Alpha Beta T Cell Receptor</option>
                                    <option value="gamma-delta">Gamma Delta T Cell Receptor</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- SPECIES SELCTOR -->
                    <div class="row row-space">
                        <!-- <div class="input-group"> -->
                            <!-- <div class="col-md-2" style="white-space: nowrap; padding-left: 1.5em;"> -->
                            <div class="col-md-4 label-center-end label-left">
                            <!-- <div class="col-md-2"> -->
                                <b>Host species:</b>
                            </div>
        
                            <div class="col">
                                <select class="selectpicker form-control form-control-filter-query" name="filter-query-species-selectpicker" id="filter-query-species-selectpicker">                                        
                                    <option value="any" selected>Any</option>
                                    <option value="human">Human</option>
                                    <option value="mouse">Mouse</option>
                                </select>
                            </div>
                        <!-- </div> -->
                    </div>


                    <!-- CHAIN SELECTOR -->
                    <div class="row row-space">
                        <div class="col">

                            <div class="section-border">
                                <div class="alpha-beta-chain-select section-border-label">Alpha Chain</div>
                                <div class="gamma-delta-chain-select section-border-label" hidden>Gamma Chain</div>
                                <div id="first-chain">
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>CDR3 Junction:</b>
                                        </div>
                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="cdr3-1" aria-describedby="search" placeholder="Ex: CAASANSGTYQRW" value="{{secondary_search_heavy}}">
                                            <input type="search" class="form-control gamma-delta-chain-select" id="cdr3-1" aria-describedby="search" placeholder="Ex: CAASANSGTYQRW" value="{{secondary_search_heavy}}" hidden>
                                        </div>
                                    </div>
                                    
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>V Gene:</b>
                                        </div>
                                        <div class="col">
                                            <select class="selectpicker form-control-filter-query" name="filter-query-first-v-selectpicker" id="filter-query-first-v-selectpicker" data-width="100%" title="Any TRAV (or specify)" data-live-search="true" data-actions-box="true" multiple> 
                                                <optgroup label="Family">
                                                    <option value="TRAV1">TRAV1</option>
                                                    <option value="TRAV2">TRAV2</option>
                                                    <option value="TRAV3">TRAV3</option>
                                                </optgroup>
                                                <optgroup label="Gene">
                                                    <option value="TRAV1-1">TRAV1-1</option>
                                                    <option value="TRAV1-11">TRAV1-11</option>
                                                    <option value="TRAV1-10">TRAV1-10</option>
                                                </optgroup>
                                                <optgroup label="Allele">
                                                    <option value="TRAV1-1*01">TRAV1-1*01</option>
                                                    <option value="TRAV1-1*011">TRAV1-1*011</option>
                                                    <option value="TRAV1-1*02">TRAV1-1*02</option>
                                                    <option value="TRAV1-1*020">TRAV1-1*020</option>
                                                    <option value="TRAV1-1*1">TRAV1-1*1</option>
                                                    <option value="TRAV1-1*10">TRAV1-1*10</option>
                                                </optgroup>
                                            </select>
                                        </div>
                                    </div>
    
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>J Gene:</b>
                                        </div>
                                        <div class="col">
                                            <select class="selectpicker form-control-filter-query" name="filter-query-first-j-selectpicker" id="filter-query-first-j-selectpicker" data-width="100%" title="Any TRAJ (or specify)" data-live-search="true" data-actions-box="true" multiple>
                                                <option value="1">TRAJ1</option>
                                                <option value="2">TRAJ2</option>
                                                <option value="3">TRAJ3</option>
                                            </select>
                                        </div>
                                    </div>
    
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="row row-space">
                        <div class="col">
                            <div class="section-border">
                                <div class="alpha-beta-chain-select section-border-label">Beta Chain</div>
                                <div class="gamma-delta-chain-select section-border-label" hidden>Delta Chain</div>
                                <div id="second-chain">
                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>CDR3 Junction:</b>
                                        </div>
                                        <div class="col">
                                            <input type="search" class="form-control alpha-beta-chain-select" id="cdr3-2" aria-describedby="search" placeholder="Ex: CASSQDGY" value="{{secondary_search_heavy}}">
                                            <input type="search" class="form-control gamma-delta-chain-select" id="cdr3-2" aria-describedby="search" placeholder="Ex: CASSQDGY" value="{{secondary_search_heavy}}" hidden>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>V Gene:</b>
                                        </div>
                                        <div class="col">
                                            <select class="selectpicker form-control-filter-query" name="filter-query-second-v-selectpicker" id="filter-query-second-v-selectpicker" data-width="100%" title="Any TRBV (or specify)" data-live-search="true" data-actions-box="true" multiple>
                                                <optgroup label="Family">
                                                    <option value="TRBV1">TRBV1</option>
                                                    <option value="TRBV2">TRBV2</option>
                                                    <option value="TRBV3">TRBV3</option>
                                                </optgroup>
                                                <optgroup label="Gene">
                                                    <option value="TRBV1-1">TRBV1-1</option>
                                                    <option value="TRBV1-11">TRBV1-11</option>
                                                    <option value="TRBV1-10">TRBV1-10</option>
                                                </optgroup>
                                                <optgroup label="Allele">
                                                    <option value="TRBV1-1*01">TRBV1-1*01</option>
                                                    <option value="TRBV1-1*011">TRBV1-1*011</option>
                                                    <option value="TRBV1-1*02">TRBV1-1*02</option>
                                                    <option value="TRBV1-1*020">TRBV1-1*020</option>
                                                    <option value="TRBV1-1*1">TRBV1-1*1</option>
                                                    <option value="TRBV1-1*10">TRBV1-1*10</option>
                                                </optgroup>
                                            </select>
                                        </div>
                                    </div>

                                    <div class="row">
                                        <div class="col-md-4 label-center-end label-left">
                                            <b>J Gene:</b>
                                        </div>
                                        <div class="col">
                                            <select class="selectpicker form-control-filter-query" name="filter-query-second-j-selectpicker" id="filter-query-second-j-selectpicker" data-width="100%" title="Any TRBJ (or specify)" data-live-search="true" data-actions-box="true" multiple>
                                                <option value="TRBJ1">TRABJ1</option>
                                                <option value="TRBJ2">TRABJ2</option>
                                                <option value="TRBJ3">TRABJ3</option>
                                            </select>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- <div class="col-md-6"></div> -->

            <div class="col-md-1">          
                <div class="row airrkb-button-container">
                    <button type="button" class="btn btn-save btn-block btn-glow" id="filter-query-apply">Search <i class="fas fa-search"></i></button>
                    <button type="button" class="btn btn-cancel btn-block" id="filter-query-clear">Clear</button>
                    <button type="button" class="btn btn-search btn-block" id="filter-query-apply-airrkb-example">Example <i class="fas fa-solid fa-dice" disabled></i></button>
                </div>
            </div>

        </div>
    </form>
</div>
