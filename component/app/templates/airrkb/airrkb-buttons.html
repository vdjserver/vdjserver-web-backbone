<div class="row general-button-bar">
    <div class="btn-group" role="group" aria-label="Button group">
        <div class="dropdown">
            <button class="btn btn-primary dropdown-toggle" type="button" id="airrkb-sort-button" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false" disabled>
            Sort By
            </button>
            <div class="dropdown-menu" aria-labelledby="dropdownMenu2">
            <button class="dropdown-item" type="button" id="airrkb-sort-select" name="study.study_title">
                {{#ifEquals current_sort "study.study_title"}}<span class="fas fa-check"></span>{{/ifEquals}}
                Study Title
            </button>
            <button class="dropdown-item" type="button" id="airrkb-sort-select" name="newest">
                {{#ifEquals current_sort "newest"}}<span class="fas fa-check"></span>{{/ifEquals}}
                Newest
            </button>
            <button class="dropdown-item" type="button" id="airrkb-sort-select" name="oldest">
                {{#ifEquals current_sort "oldest"}}<span class="fas fa-check"></span>{{/ifEquals}}
                Oldest
            </button>
            <button class="dropdown-item" type="button" id="airrkb-sort-select" name="num_repertoires">
                {{#ifEquals current_sort "num_repertoires"}}<span class="fas fa-check"></span>{{/ifEquals}}
                Number of Repertoires
            </button>
            <div class="dropdown-divider"></div>
            <button class="dropdown-item disabled" type="button">
                Add Custom Sort...
            </button>
            </div>
        </div>
    </div>
    <div class="btn-group" role="group" aria-label="Button group">
        <button type="button" class="btn btn-edit chart-action" id="add-chart" disabled>Add Chart <i class="fas fa-plus"></i></button>
    </div>
</div>
