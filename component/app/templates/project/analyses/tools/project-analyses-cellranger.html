<div id="project-analyses-cellranger-parameters" class="row">
    <div class="col">
        <form method="post" role="form" id="project-analyses-cellranger-parameters-form"
              class="project-analyses-cellranger-parameters-form needs-validation" novalidate>

            <div class="form-row align-items-center">
                <!--Adding Space for gap in front-->
                <div class="form-group col-md-2"></div>

                <!-- Species -->
                <div class="form-group col-md-2">
                    <label for="project-analyses-cellranger-parameters-species-select">Species:</label>
                    <select class="selectpicker form-control form-control-cellranger" name="species" id="project-analyses-cellranger-parameters-species-select" {{#ifNot status "SUBMITTED"}}disabled{{/ifNot}}>
                        <option id="human" value="human" {{#ifEquals value.species "human"}}selected{{/ifEquals}}>Homo sapiens</option>
                        <option id="macaque" value="macaque" {{#ifEquals value.species "macaque"}}selected{{/ifEquals}} disabled>Macaca mulatta</option>
                        <option id="mouse" value="mouse" {{#ifEquals value.species "mouse"}}selected{{/ifEquals}} disabled>Mus musculus</option>
                    </select>
                </div>

                <!-- Strain -->
                <div class="form-group col-md-1">
                    <div id="human-strain-select">
                        <label for="project-analyses-cellranger-parameters-human-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-cellranger" name="strain" id="project-analyses-cellranger-parameters-human-strain-select" disabled>
                            {{#each strain_options}}
                                {{#ifEquals this.species "human"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                    <div id="macaque-strain-select">
                        <label for="project-analyses-cellranger-parameters-macaque-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-cellranger" name="strain" id="project-analyses-cellranger-parameters-macaque-strain-select" disabled>
                            {{#each strain_options}}
                                {{#ifEquals this.species "macaque"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                    <div id="mouse-strain-select">
                        <label for="project-analyses-cellranger-parameters-mouse-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-cellranger" name="strain" id="project-analyses-cellranger-parameters-mouse-strain-select">
                            {{#each strain_options}}
                                {{#ifEquals this.species "mouse"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                </div>

                <!-- TCR Germline Database -->
                <div class="form-group col-md-3">
                    <div id="tr-db-select">
                        <label for="project-analyses-cellranger-parameters-germline-select-tr">TCR Germline Database:</label>
                        <select class="selectpicker form-control form-control-cellranger" name="germline_db_TR" id="project-analyses-cellranger-parameters-germline-select-tr" {{#ifNot status "SUBMITTED"}}disabled{{/ifNot}}>
                            {{#each germline_dbs}}
                                {{#ifEquals this.locus "TR"}}
                                    <option value="{{this.value}}" {{#ifEquals ../value.germline_db_TR this.value}}selected{{/ifEquals}}>
                                        {{this.label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                </div>

                <!-- IG Germline Database -->
                <div class="form-group col-md-3">
                    <div id="ig-db-select">
                        <label for="project-analyses-cellranger-parameters-germline-select-ig">IG Germline Database:</label>
                        <select class="selectpicker form-control form-control-cellranger" name="germline_db_IG" id="project-analyses-cellranger-parameters-germline-select-ig" {{#ifNot status "SUBMITTED"}}disabled{{/ifNot}}>
                            {{#each germline_dbs}}
                                {{#ifEquals this.locus "IG"}}
                                    <option value="{{this.value}}" {{#ifEquals ../value.germline_db_IG this.value}}selected{{/ifEquals}}>
                                        {{this.label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                </div>

            </div>
        </form>
    </div>
</div>
