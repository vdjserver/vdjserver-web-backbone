<div id="project-analyses-igblast-parameters" class="row">
    <div class="col">
        <form method="post" role="form" id="project-analyses-igblast-parameters-form"
              class="project-analyses-igblast-parameters-form needs-validation" novalidate>

            <div class="form-row align-items-center">
                <!--Adding Space for gap in front-->
                <div class="form-group col-md-3"></div>

                <!-- Species -->
                <div class="form-group col-md-2">
                    <label for="project-analyses-igblast-parameters-species-select">Species:</label>
                    <select class="selectpicker form-control form-control-igblast" name="species" id="project-analyses-igblast-parameters-species-select">
                        <option id="human" value="human" {{#ifEquals value.species "human"}}selected{{/ifEquals}}>Homo sapiens</option>
                        <option id="macaque" value="macaque" {{#ifEquals value.species "macaque"}}selected{{/ifEquals}} disabled>Macaca mulatta</option>
                        <option id="mouse" value="mouse" {{#ifEquals value.species "mouse"}}selected{{/ifEquals}} disabled>Mus musculus</option>
                    </select>
                </div>

                <!-- Strain -->
                <div class="form-group col-md-1">
                    <div id="human-strain-select">
                        <label for="project-analyses-igblast-parameters-human-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-igblast" id="project-analyses-igblast-parameters-human-strain-select" disabled>
                            {{#each strain_options}}
                                {{#ifEquals this.species "human"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                    <div id="macaque-strain-select">
                        <label for="project-analyses-igblast-parameters-macaque-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-igblast" id="project-analyses-igblast-parameters-macaque-strain-select" disabled>
                            {{#each strain_options}}
                                {{#ifEquals this.species "macaque"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                    <div id="mouse-strain-select">
                        <label for="project-analyses-igblast-parameters-mouse-strain-select">Strain:</label>
                        <select class="selectpicker form-control form-control-igblast" id="project-analyses-igblast-parameters-mouse-strain-select">
                            {{#each strain_options}}
                                {{#ifEquals this.species "mouse"}}
                                    <option value="{{value}}" {{#ifEquals ../value.strain value}}selected{{/ifEquals}}>
                                        {{label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                </div>

                <!-- Locus -->
                <div class="form-group col-md-1">
                    <label for="project-analyses-igblast-parameters-locus-select">Locus:</label>
                    <select id="project-analyses-igblast-parameters-locus-select" class="selectpicker form-control form-control-igblast" name="locus" id="locus" {{#ifEquals view_mode "detail"}}disabled{{/ifEquals}}>
                        {{#each locus_enum}}
                            <option id="{{this}}" value="{{this}}" {{#ifEquals this ../value.locus}}selected{{/ifEquals}}>{{this}}</option>
                        {{/each}}
                    </select>
                </div>

                <!-- Germline Database -->
                <div class="form-group col-md-2">
                    <div id="ig-db-select">
                        <label for="project-analyses-igblast-parameters-germline-select-ig">Germline Database:</label>
                        <select class="selectpicker form-control form-control-igblast" id="project-analyses-igblast-parameters-germline-select-ig">
                            {{#each germline_dbs}}
                                {{#ifEquals this.locus "IG"}}
                                    <option value="{{this.value}}" {{#ifEquals ../value.locus this.locus}}selected{{/ifEquals}}>
                                        {{this.label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                    <div id="tr-db-select">
                        <label for="project-analyses-igblast-parameters-germline-select-tr">Germline Database:</label>
                        <select class="selectpicker form-control form-control-igblast" id="project-analyses-igblast-parameters-germline-select-tr">
                            {{#each germline_dbs}}
                                {{#ifEquals this.locus "TR"}}
                                    <option value="{{this.value}}" {{#ifEquals ../value.locus this.locus}}selected{{/ifEquals}}>
                                        {{this.label}}
                                    </option>
                                {{/ifEquals}}
                            {{/each}}
                        </select>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
